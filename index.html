<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consumo de cable - Compras públicas Ecuador</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<header class="header">
  <div class="logo-container">
    <img src="logo.png" class="logo">
  </div>

  <h1>Consumo de cable - Compras públicas Ecuador</h1>

  <img src="https://flagcdn.com/w40/ec.png" class="flag">
</header>

<section class="kpis">
  <div class="kpi"><h3>Total</h3><p id="totalKPI">0</p></div>
  <div class="kpi"><h3>Top Tec</h3><p id="topTecKPI">-</p></div>
  <div class="kpi"><h3>Empresas</h3><p id="empresasKPI">0</p></div>
  <div class="kpi"><h3>Top Nivel</h3><p id="topNivelKPI">-</p></div>
</section>

<section class="filters">
  <div>
    <label>Empresa</label>
    <div id="empresaFilter" class="filter-buttons"></div>
  </div>

  <div>
    <label>Nivel</label>
    <div id="nivelFilter" class="filter-buttons"></div>
  </div>

  <div>
    <label>Material</label>
    <div id="materialFilter" class="filter-buttons"></div>
  </div>

  <button id="resetBtn">Reset</button>
</section>

<main class="main">

  <div class="charts">
    <div class="card"><canvas id="techChart"></canvas></div>
    <div class="card"><canvas id="materialChart"></canvas></div>
    <div class="card full"><canvas id="nivelChart"></canvas></div>
  </div>

  <div class="ranking">
    <h3>🏆 Ranking</h3>
    <table>
      <tbody id="rankingTable"></tbody>
    </table>
  </div>

</main>

<footer>
Contacto: Andrés Cuadrado / Cablec - Prysmian Ecuador /
0998879869 / andres.cuadrado.ex@prysmian.com
</footer>

<script src="script.js"></script>

</body>
</html>
